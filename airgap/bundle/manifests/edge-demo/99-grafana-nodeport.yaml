# Bundle-only: NodePort for Grafana.
# The lab (airgap VMs) uses the Ingress in 50-grafana.yaml behind traefik.
# The bundle installs k3s with traefik disabled, so expose Grafana directly.
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-np
  namespace: edge-demo
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
  - { port: 3000, targetPort: 3000, nodePort: 30080, name: http }
