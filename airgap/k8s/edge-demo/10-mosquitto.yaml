---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: edge-demo
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: edge-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: mosquitto }
  template:
    metadata:
      labels: { app: mosquitto }
    spec:
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2
        ports:
        - { containerPort: 1883, name: mqtt }
        volumeMounts:
        - { name: conf, mountPath: /mosquitto/config/ }
        - { name: data, mountPath: /mosquitto/data/ }
        resources:
          requests: { cpu: 20m, memory: 32Mi }
          limits:   { cpu: 200m, memory: 128Mi }
      volumes:
      - name: conf
        configMap: { name: mosquitto-config }
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: edge-demo
spec:
  selector: { app: mosquitto }
  ports:
  - { port: 1883, targetPort: 1883, name: mqtt }
