---
# Datasources & the original sensor dashboard, formatted for the
# kube-prometheus-stack Grafana sidecar (label `grafana_datasource: "1"` /
# `grafana_dashboard: "1"`).
# Replaces the standalone Grafana that lived in the old 50-grafana.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-ds-edge-demo
  namespace: edge-demo
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: TimescaleDB
      uid: tsdb
      type: postgres
      access: proxy
      url: timescaledb.edge-demo.svc:5432
      database: sensors
      user: edge
      secureJsonData:
        password: edgedemo
      jsonData:
        sslmode: disable
        postgresVersion: 1600
        timescaledb: true
      isDefault: false
      editable: false
    - name: PrometheusKPS
      uid: prom
      type: prometheus
      access: proxy
      url: http://kps-prometheus.monitoring.svc:9090
      isDefault: true
      editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-factory
  namespace: edge-demo
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: edge-demo
data:
  factory.json: |
    {
      "title": "Factory Line 1 — Live Sensors",
      "schemaVersion": 38,
      "uid": "factory-line1",
      "tags": ["edge", "factory"],
      "timezone": "browser",
      "time": { "from": "now-5m", "to": "now" },
      "refresh": "5s",
      "panels": [
        {
          "type": "timeseries",
          "title": "Temperature (°C)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [{
            "refId": "A",
            "format": "time_series",
            "rawSql": "SELECT ts AS time, sensor_id AS metric, temperature_c AS value FROM readings WHERE $__timeFilter(ts) ORDER BY ts"
          }]
        },
        {
          "type": "timeseries",
          "title": "Pressure (bar)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{
            "refId": "A",
            "format": "time_series",
            "rawSql": "SELECT ts AS time, sensor_id AS metric, pressure_bar AS value FROM readings WHERE $__timeFilter(ts) ORDER BY ts"
          }]
        },
        {
          "type": "timeseries",
          "title": "Humidity (%)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [{
            "refId": "A",
            "format": "time_series",
            "rawSql": "SELECT ts AS time, sensor_id AS metric, humidity_pct AS value FROM readings WHERE $__timeFilter(ts) ORDER BY ts"
          }]
        },
        {
          "type": "stat",
          "title": "Readings / min (last 5m)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 8 },
          "targets": [{
            "refId": "A",
            "format": "table",
            "rawSql": "SELECT COUNT(*)::float / 5 AS \"rate\" FROM readings WHERE ts > now() - INTERVAL '5 minutes'"
          }]
        },
        {
          "type": "stat",
          "title": "Active sensors (5m)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 8 },
          "targets": [{
            "refId": "A",
            "format": "table",
            "rawSql": "SELECT COUNT(DISTINCT sensor_id) AS \"count\" FROM readings WHERE ts > now() - INTERVAL '5 minutes'"
          }]
        },
        {
          "type": "timeseries",
          "title": "Ingest rate by bridge (inserts / 5s)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 8, "w": 18, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": { "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 60 } }
          },
          "targets": [{
            "refId": "A",
            "format": "time_series",
            "rawSql": "SELECT time_bucket('5 seconds', ts) AS time, source AS metric, COUNT(*) AS value FROM readings WHERE $__timeFilter(ts) GROUP BY time, source ORDER BY time"
          }]
        },
        {
          "type": "bargauge",
          "title": "Rows by bridge (last 5m)",
          "datasource": { "type": "postgres", "uid": "tsdb" },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 16 },
          "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true },
          "targets": [{
            "refId": "A",
            "format": "table",
            "rawSql": "SELECT source AS metric, COUNT(*)::bigint AS value FROM readings WHERE ts > now() - INTERVAL '5 minutes' GROUP BY source ORDER BY source"
          }]
        }
      ]
    }
