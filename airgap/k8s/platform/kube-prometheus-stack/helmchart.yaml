---
# Drives helm-controller (built into k3s) to install kube-prometheus-stack.
# helm-controller spawns a Job that runs `helm install` in-cluster, so the
# k3s nodes need temporary egress while this lands AND while the resulting
# pods (Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics)
# pull their images.
#
# Grafana picks up dashboards & datasources from any ConfigMap in the cluster
# carrying the `grafana_dashboard: "1"` / `grafana_datasource: "1"` label
# (see ../../edge-demo/51-grafana-resources.yaml, 52-comparison-dashboard.yaml).
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: kps
  namespace: kube-system
spec:
  chart: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  version: "61.9.0"
  targetNamespace: monitoring
  createNamespace: false
  valuesContent: |-
    fullnameOverride: kps

    crds:
      enabled: true

    alertmanager:
      enabled: true

    grafana:
      enabled: true
      adminPassword: admin
      defaultDashboardsTimezone: browser
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: airgap-ca
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - grafana.apps.airgap.local
        tls:
          - hosts: [grafana.apps.airgap.local]
            secretName: grafana-tls
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_role: Viewer
        users:
          allow_sign_up: false
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
        datasources:
          enabled: true
          label: grafana_datasource
          labelValue: "1"
          searchNamespace: ALL

    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        retention: 6h
        retentionSize: "2GB"
        resources:
          requests: { cpu: 100m, memory: 512Mi }
          limits:   { cpu: 1000m, memory: 2Gi }
        scrapeInterval: 5s
        evaluationInterval: 15s

    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      resources:
        requests: { cpu: 10m, memory: 32Mi }
        limits:   { cpu: 100m, memory: 128Mi }
    prometheus-node-exporter:
      resources:
        requests: { cpu: 10m, memory: 32Mi }
        limits:   { cpu: 100m, memory: 128Mi }
