name: build-and-deploy
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    steps:
      # Airgap-native checkout — act_runner's default `actions/checkout@v4`
      # fetches from github.com, which the Gitea VM can't reach. Shell clone
      # over the local Gitea instance uses the per-job token transparently.
      - name: Checkout (airgap)
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          git init -q
          git config --global --add safe.directory "$PWD"
          HOST="${GITHUB_SERVER_URL#http://}"
          HOST="${HOST#https://}"
          git remote add origin "http://oauth2:${GITEA_TOKEN}@${HOST}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout FETCH_HEAD

      - name: Login Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
        # docker login (not skopeo) — the next step's `docker push` reads
        # auth from ~/.docker/config.json, and skopeo writes to a different
        # file in the alpine runner image. dockerd has insecure-registries
        # set, so the self-signed Harbor cert is accepted.
        run: echo "$HARBOR_PASS" | docker login harbor.airgap.local -u "$HARBOR_USER" --password-stdin

      - name: Build + push
        run: |
          TAG=$(git rev-parse --short HEAD)
          docker build --build-arg APP_VERSION=$TAG -t harbor.airgap.local/apps/hello:$TAG .
          docker push harbor.airgap.local/apps/hello:$TAG
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Rollout
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kc
          kubectl --kubeconfig=/tmp/kc -n apps set image deploy/hello hello=harbor.airgap.local/apps/hello:$TAG
          kubectl --kubeconfig=/tmp/kc -n apps rollout status deploy/hello --timeout=180s
