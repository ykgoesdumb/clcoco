apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: airgap-ca
spec:
  ingressClassName: traefik
  tls:
    - hosts: [hello.apps.airgap.local]
      secretName: hello-tls
  rules:
    - host: hello.apps.airgap.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello
                port: { name: http }
