log:
  level: info
runner:
  file: /data/.runner
  capacity: 2
  timeout: 30m
  insecure: false
  labels:
    - self-hosted:host
    - ubuntu-latest:docker://harbor.airgap.local/mirror/alpine:3.19
cache:
  enabled: false
container:
  network: bridge
  privileged: false
  options: ""
  valid_volumes:
    - /var/run/docker.sock
  docker_host: unix:///var/run/docker.sock
host:
  workdir_parent: /data/workdir
