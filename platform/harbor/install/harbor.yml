# harbor.yml
hostname: harbor.airgap.local

http:
  port: 80

https:
  port: 443
  certificate: /opt/airgap-ca/harbor.crt
  private_key: /opt/airgap-ca/harbor.key

harbor_admin_password: clcoco   # PoC 기본값 — 고객사 반입 전 변경

database:
  password: root123   # PoC 기본값 — 고객사 반입 전 변경
  max_idle_conns: 100
  max_open_conns: 900
  conn_max_lifetime: 5m
  conn_max_idle_time: 0

data_volume: /data/harbor

jobservice:
  max_job_workers: 10
  job_loggers:
    - STD_OUTPUT
    - FILE
  logger_sweeper_duration: 1

notification:
  webhook_job_max_retry: 3
  webhook_job_http_client_timeout: 3

log:
  level: info
  local:
    rotate_count: 50
    rotate_size: 200M
    location: /var/log/harbor

trivy:
  ignore_unfixed: false
  skip_update: true
  skip_java_db_update: false
  offline_scan: true
  security_check: vuln
  insecure: false

proxy:
  http_proxy:
  https_proxy:
  no_proxy:
  components:
    - core
    - jobservice
    - trivy

upload_purging:
  enabled: true
  age: 168h
  interval: 24h
  dryrun: false

cache:
  enabled: false
  expire_hours: 24

_version: 2.10.0
